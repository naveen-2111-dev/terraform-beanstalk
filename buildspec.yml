version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt --target ./package

  build:
    commands:
      - echo "Running tests..."
      - python -m pytest tests/ -v || true

      - echo "Packaging application..."
      - rm -rf deploy && mkdir deploy

      # copy app
      - cp -r app deploy/

      # copy dependencies
      - cp -r package/* deploy/

      # copy config files
      - cp requirements.txt Procfile pyproject.toml README.md deploy/ || true

artifacts:
  base-directory: deploy
  files:
    - '**/*'