version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt --target ./package

  build:
    commands:
      - echo "Running tests..."
      - python -m pytest tests/ -v || true

      - echo "Packaging application..."

      - rm -rf deploy && mkdir deploy

      - cp -r app deploy/

      - cp Procfile requirements.txt pyproject.toml README.md deploy/ || true

      - cd deploy
      - zip -r ../app.zip .
      - cd ..

artifacts:
  files:
    - app.zip
  discard-paths: yes