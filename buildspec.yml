version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt

  build:
    commands:
      - zip -r app.zip app/ Procfile requirements.txt
      - echo "--- ZIP CONTENTS ---"
      - unzip -l app.zip

artifacts:
  files:
    - app.zip
  discard-paths: yes