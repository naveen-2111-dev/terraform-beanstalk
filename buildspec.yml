version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt --target ./package

  build:
    commands:
      - echo "Running tests..."
      - python -m pytest tests/ -v || true

      - echo "Packaging application..."

      # Clean and prepare deploy folder
      - rm -rf deploy && mkdir deploy

      # Copy app and config files to deploy root
      - cp -r app deploy/
      - cp requirements.txt Procfile pyproject.toml README.md deploy/ || true

      # Zip the CONTENTS of deploy/ (not the folder itself)
      - cd deploy
      - zip -r ../app.zip .
      - cd ..

artifacts:
  files:
    - app.zip
  discard-paths: yes