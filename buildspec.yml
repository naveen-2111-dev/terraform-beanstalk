version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r requirements.txt --target ./package
  build:
    commands:
      - echo "Running tests..."
      - python -m pytest tests/ -v || true
      - echo "Packaging application..."
      - zip -r app.zip . -x "*.git*" -x "tests/*" -x ".terraform/*"

artifacts:
  files:
    - app.zip
  discard-paths: yes